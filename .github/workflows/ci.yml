name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests
        shell: pwsh
        run: ./world/smoke_test.ps1

  pool-validate:
    name: Pool validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate article pool against Wikipedia
        run: python world/validate_article_pool.py --strict
