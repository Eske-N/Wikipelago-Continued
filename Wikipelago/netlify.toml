[build]
  publish = "web"

[[redirects]]
  from = "/api/*"
  to = "https://wikipelago-contd.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://wikipelago-contd.onrender.com/health"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "20"
